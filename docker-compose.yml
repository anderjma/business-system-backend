services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - Cors__AllowedOrigins__0=${FRONTEND_URL:-http://localhost:5173}
      - Jwt__Key=${JWT_SECRET:-SuperSecretKeyForDevelopmentOnlyPleaseChangeInProduction!!!}
      # Si se define DATABASE_URL en el archivo .env, se conectará a Supabase; de lo contrario, usará el PostgreSQL local de Compose.
      - ConnectionStrings__DefaultConnection=${DATABASE_URL:-Host=db;Database=business_system_db;Username=postgres;Password=postgres_password}
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=business_system_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
